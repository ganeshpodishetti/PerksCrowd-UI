[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_API_URL,NEXT_PUBLIC_API_BASE_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "https://www.perkscrowd.com/*"
  to = "https://perkscrowd.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://studentperks.com/*"
  to = "https://perkscrowd.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.studentperks.com/*"
  to = "https://perkscrowd.com/:splat"
  status = 301
  force = true

# Proxy API requests to avoid CORS issues
[[redirects]]
  from = "/api/*"
  to = "https://api.perkscrowd.com/api/:splat"
  status = 200
  force = true
